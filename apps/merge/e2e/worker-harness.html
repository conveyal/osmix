<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Osmix worker runtime harness</title>
  </head>
  <body>
    <script type="module">
      import { createRemote } from "osmix";

      const occupiedTile = [17059, 11948, 15];
      const tileSize = 64;

      async function loadMonaco(remote, id) {
        const response = await fetch("/monaco.pbf");
        if (!response.ok) throw new Error(`Failed to fetch Monaco: ${response.status}`);
        return remote.fromPbf(await response.arrayBuffer(), { id });
      }

      async function loadMonacoSubview(remote, id) {
        const response = await fetch("/monaco.pbf");
        if (!response.ok) throw new Error(`Failed to fetch Monaco: ${response.status}`);
        const bytes = new Uint8Array(await response.arrayBuffer());
        const surrounding = new Uint8Array(bytes.byteLength + 2);
        surrounding[0] = 0xff;
        surrounding.set(bytes, 1);
        surrounding[surrounding.length - 1] = 0xee;
        return remote.fromPbf(surrounding.subarray(1, -1), { id });
      }

      async function runSingleWorker() {
        const remote = await createRemote({ workerCount: 1 });
        try {
          const dataset = await loadMonaco(remote, "single-worker-monaco");
          const counts = {
            nodes: await dataset.nodes.size(),
            ways: await dataset.ways.size(),
            relations: await dataset.relations.size(),
          };
          const vectorTile = await dataset.getVectorTile(occupiedTile);
          const rasterTile = await dataset.getRasterTile(occupiedTile, { tileSize });

          return {
            mode: remote.mode,
            workerCount: remote.workerCount,
            counts,
            vectorByteLength: vectorTile.byteLength,
            rasterByteLength: rasterTile.byteLength,
            rasterHasNontransparentPixel: rasterTile.some(
              (value, index) => index % 4 === 3 && value > 0,
            ),
          };
        } finally {
          remote[Symbol.dispose]();
        }
      }

      async function runMultiWorker() {
        const remote = await createRemote({ workerCount: 2 });
        try {
          const dataset = await loadMonaco(remote, "multi-worker-monaco");
          const nodeCounts = [await dataset.nodes.size(), await dataset.nodes.size()];
          const wayCounts = [await dataset.ways.size(), await dataset.ways.size()];
          const relationCounts = [await dataset.relations.size(), await dataset.relations.size()];
          const vectorByteLengths = [
            (await dataset.getVectorTile(occupiedTile)).byteLength,
            (await dataset.getVectorTile(occupiedTile)).byteLength,
          ];

          return {
            crossOriginIsolated,
            mode: remote.mode,
            workerCount: remote.workerCount,
            nodeCounts,
            wayCounts,
            relationCounts,
            vectorByteLengths,
          };
        } finally {
          remote[Symbol.dispose]();
        }
      }

      async function runSingleWorkerTransfer() {
        const remote = await createRemote({ workerCount: 1 });
        try {
          const dataset = await loadMonacoSubview(remote, "single-worker-transfer-monaco");
          const osm = await dataset.transferOut();

          return {
            mode: remote.mode,
            workerCount: remote.workerCount,
            counts: {
              nodes: osm.nodes.size,
              ways: osm.ways.size,
              relations: osm.relations.size,
            },
          };
        } finally {
          remote[Symbol.dispose]();
        }
      }

      async function runReservedIds(workerCount) {
        const remote = await createRemote({ workerCount });
        const ids = ["__proto__", "constructor", "toString", "ordinary"];
        try {
          const datasets = [];
          for (const id of ids) datasets.push(await loadMonaco(remote, id));
          const beforeDelete = await Promise.all(datasets.map((dataset) => dataset.has()));
          await datasets[1].delete();
          const afterDelete = await Promise.all(datasets.map((dataset) => dataset.has()));
          const survivorNodeCounts = await Promise.all(
            datasets.map(async (dataset) => ((await dataset.has()) ? dataset.nodes.size() : 0)),
          );

          return {
            mode: remote.mode,
            workerCount: remote.workerCount,
            ids,
            beforeDelete,
            afterDelete,
            survivorNodeCounts,
          };
        } finally {
          remote[Symbol.dispose]();
        }
      }

      async function runDispose() {
        const remote = await createRemote({ workerCount: 1 });
        let worker;
        await remote.runWithWorker((candidate) => {
          worker = candidate;
        });
        remote.terminate();
        remote[Symbol.dispose]();

        let releasedProxyError = false;
        try {
          await worker.isReady("disposed");
        } catch (error) {
          releasedProxyError = String(error).includes("released");
        }

        let completedCycles = 0;
        for (let i = 0; i < 3; i++) {
          const cycleRemote = await createRemote({ workerCount: 1 });
          cycleRemote[Symbol.dispose]();
          completedCycles++;
        }

        return {
          releasedProxyError,
          workerCount: remote.workerCount,
          completedCycles,
        };
      }

      async function runManagedScheduling() {
        const remote = await createRemote({ workerCount: 2 });
        try {
          const dataset = await loadMonaco(remote, "managed-scheduling-monaco");
          const completionOrder = [];
          const slow = remote.runWithWorker(
            async (worker, index) => {
              await new Promise((resolve) => setTimeout(resolve, 80));
              completionOrder.push("slow");
              return { index, nodes: await worker.nodesSize(dataset.id) };
            },
            { lane: "compute" },
          );

          await new Promise((resolve) => setTimeout(resolve, 10));
          const abortController = new AbortController();
          let abortedTaskRan = false;
          const aborted = remote
            .runWithWorker(
              () => {
                abortedTaskRan = true;
              },
              { lane: "compute", signal: abortController.signal },
            )
            .then(
              () => false,
              () => true,
            );
          const low = remote.runWithWorker(() => completionOrder.push("low"), {
            lane: "compute",
            priority: 0,
          });
          const high = remote.runWithWorker(() => completionOrder.push("high"), {
            lane: "compute",
            priority: 10,
          });
          abortController.abort();

          const [slowResult, wasAborted] = await Promise.all([slow, aborted, low, high]);
          const controlIndex = await remote.runWithWorker((_worker, index) => index, {
            lane: "control",
          });
          const computeIndex = await remote.runWithWorker((_worker, index) => index, {
            lane: "compute",
          });

          return {
            abortedTaskRan,
            completionOrder,
            computeIndex,
            controlIndex,
            slowResult,
            wasAborted,
          };
        } finally {
          remote[Symbol.dispose]();
        }
      }

      function inspectBuffers(value) {
        const buffers = new Set();
        const visited = new WeakSet();
        const visit = (candidate) => {
          if (
            candidate instanceof ArrayBuffer ||
            (typeof SharedArrayBuffer !== "undefined" && candidate instanceof SharedArrayBuffer)
          ) {
            buffers.add(candidate);
            return;
          }
          if (ArrayBuffer.isView(candidate)) {
            buffers.add(candidate.buffer);
            return;
          }
          if (!candidate || (typeof candidate !== "object" && typeof candidate !== "function")) {
            return;
          }
          if (visited.has(candidate)) return;
          visited.add(candidate);
          for (const child of Object.values(candidate)) visit(child);
        };
        visit(value);
        const sharedBufferCount = [...buffers].filter(
          (buffer) => buffer instanceof SharedArrayBuffer,
        ).length;
        return {
          allShared: buffers.size > 0 && sharedBufferCount === buffers.size,
          bufferCount: buffers.size,
          sharedBufferCount,
        };
      }

      async function runTimeoutRecoveryAndSharing() {
        const remote = await createRemote({ workerCount: 2 });
        try {
          const dataset = await loadMonaco(remote, "recovery-sharing-monaco");
          let attempts = 0;
          const recovered = await remote.runWithWorker(
            async (worker, index) => {
              attempts++;
              if (attempts === 1) return new Promise(() => {});
              return { index, nodes: await worker.nodesSize(dataset.id) };
            },
            { lane: "compute", retry: "once", timeoutMs: 250 },
          );

          const inspectWorker = async (worker, index) => {
            const [hasDataset, nodes, transferables] = await Promise.all([
              worker.has(dataset.id),
              worker.nodesSize(dataset.id),
              worker.getOsmBuffers(dataset.id),
            ]);
            return {
              ...inspectBuffers(transferables),
              contentHash: transferables.contentHash,
              hasDataset,
              index,
              nodes,
            };
          };
          const control = await remote.runWithWorker(inspectWorker, { lane: "control" });
          const compute = await remote.runWithWorker(inspectWorker, { lane: "compute" });

          return {
            attempts,
            compute,
            control,
            matchingContentHashes: control.contentHash === compute.contentHash,
            recovered,
          };
        } finally {
          remote[Symbol.dispose]();
        }
      }

      window.workerHarness = {
        runDispose,
        runManagedScheduling,
        runMultiWorker,
        runReservedIds,
        runSingleWorker,
        runSingleWorkerTransfer,
        runTimeoutRecoveryAndSharing,
      };
    </script>
  </body>
</html>
