name: CI Checks
description: Run checks and tests

runs:
  using: composite
  steps:
    - name: Type check
      shell: bash
      run: pnpm run typecheck

    - name: Build packages
      shell: bash
      run: pnpm run build

    - name: Lint (oxlint)
      shell: bash
      run: pnpm exec oxlint --type-aware -f github

    - name: Format check (oxfmt)
      shell: bash
      run: pnpm exec oxfmt . --check

    - name: Run package tests
      shell: bash
      run: pnpm run test:packages

    - name: Run Node.js smoke test
      shell: bash
      run: pnpm run test:node-smoke
