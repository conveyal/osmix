name: CI Checks
description: Run checks and tests

runs:
  using: composite
  steps:
    - name: Type check
      shell: bash
      run: pnpm run typecheck

    - name: Check workspace dependencies
      shell: bash
      run: pnpm run check:deps

    - name: Build packages
      shell: bash
      run: pnpm run build

    - name: Lint (oxlint)
      shell: bash
      run: pnpm exec oxlint --type-aware -f github

    - name: Format check (oxfmt)
      shell: bash
      run: pnpm exec oxfmt . --check

    - name: Run package tests
      shell: bash
      run: pnpm run test:packages

    - name: Install Chromium
      shell: bash
      run: pnpm --filter @osmix/merge exec playwright install --with-deps chromium

    - name: Run browser worker tests
      shell: bash
      run: pnpm --filter @osmix/merge test:e2e
