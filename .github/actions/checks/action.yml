name: CI Checks
description: Run checks and tests

runs:
  using: composite
  steps:
    - name: Type check
      shell: bash
      run: pnpm run typecheck

    - name: Lint (Biome)
      shell: bash
      run: pnpm run lint . --reporter github

    - name: Biome checks
      shell: bash
      run: pnpm run check . --reporter github

    - name: Run package tests
      shell: bash
      run: pnpm run test:packages

    - name: Run Node.js smoke test
      shell: bash
      run: pnpm run test:node-smoke
