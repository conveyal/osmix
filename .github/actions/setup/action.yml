name: CI Setup
description: Setup pnpm and install dependencies

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        cache: true

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
