name: Release

permissions:
  id-token: write # Required for OIDC
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - uses: ./.github/actions/setup

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # After versioning, `pnpm install` must be run to update the package.json files.
          version: pnpm run version

          # `npm pack` is necessary to replace workspace deps.
          # But we need `npm publish` to publish via OIDC.
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NPM_TOKEN: "" # Workaround to support trusted publishing
